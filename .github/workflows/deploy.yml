name: Deploy a WSL

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Copiar archivos al servidor
        run: |
          cp -r $GITHUB_WORKSPACE/* /var/www/html/app/
          rm -rf /var/www/html/app/.github

      - name: Recargar NGINX
        run: sudo service nginx reload

      - name: Verificar permisos
        run: |
          sudo chown -R www-data:www-data /var/www/html/app/
          sudo chmod -R 755 /var/www/html/app/
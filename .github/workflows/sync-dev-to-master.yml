name: Sync dev to master

on:
  push:
    branches:
      - dev

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr-and-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Create or reuse PR from dev to master
        id: create_pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PR_MERGE_TOKEN || github.token }}
          script: |
            const { owner, repo } = context.repo;
            const head = `${owner}:dev`;
            const base = 'master';

            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head,
              base,
              per_page: 1
            });

            if (existing.data.length > 0) {
              const pr = existing.data[0];
              core.info(`Using existing PR #${pr.number}`);
              core.setOutput('pr_number', String(pr.number));
              return;
            }

            try {
              const created = await github.rest.pulls.create({
                owner,
                repo,
                head: 'dev',
                base,
                title: 'Sync: dev -> master',
                body: 'PR creado automaticamente desde la rama dev.'
              });

              core.info(`Created PR #${created.data.number}`);
              core.setOutput('pr_number', String(created.data.number));
            } catch (error) {
              if (error.status === 422) {
                core.info('No hay cambios entre dev y master.');
                core.setOutput('pr_number', '');
                return;
              }
              throw error;
            }

      - name: Try to merge PR into master
        if: steps.create_pr.outputs.pr_number != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PR_MERGE_TOKEN || github.token }}
          script: |
            const { owner, repo } = context.repo;
            const pull_number = Number('${{ steps.create_pr.outputs.pr_number }}');

            const pr = await github.rest.pulls.get({ owner, repo, pull_number });
            if (!pr.data.mergeable) {
              core.warning('PR no mergeable aun (conflicto o calculo en progreso).');
              return;
            }

            await github.rest.pulls.merge({
              owner,
              repo,
              pull_number,
              merge_method: 'squash'
            });
            core.info(`PR #${pull_number} fusionado en master.`);